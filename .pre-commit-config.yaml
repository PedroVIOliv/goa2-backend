repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check src tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: black
        name: black
        entry: uv run black --check src tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: check-card-items
        name: check card item counts
        entry: env PYTHONPATH=src uv run python -m goa2.scripts.check_card_items
        language: system
        pass_filenames: false
        files: ^src/goa2/data/heroes/.*\.py$
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -q
        language: system
        pass_filenames: false
        stages: [pre-push]
